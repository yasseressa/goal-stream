services:
  - name: kinglive-api
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: kinglive-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: SPORTS_PROVIDER
        value: api_sports
      - key: FOOTBALL_DATA_BASE_URL
        value: https://v3.football.api-sports.io
      - key: FOOTBALL_DATA_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false

  - name: kinglive-web
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /ar
    envVars:
      - key: INTERNAL_API_BASE_URL
        fromService:
          type: web
          name: kinglive-api
          property: hostport

databases:
  - name: kinglive-db
    plan: free
    databaseName: kinglive
