services:
  frontend:
    build:
      context: ./frontend
    container_name: melbet_live_frontend
    env_file:
      - ./frontend/.env.example
    environment:
      INTERNAL_API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: melbet_live_backend
    env_file:
      - ./backend/.env.example
    environment:
      APP_ENV: docker
      DATABASE_HOST: postgres
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: melbet_live_postgres
    environment:
      POSTGRES_DB: melbet_live
      POSTGRES_USER: melbet
      POSTGRES_PASSWORD: melbet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U melbet -d melbet_live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
